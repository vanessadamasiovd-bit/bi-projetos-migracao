<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI Projetos de Migracao - Group Software</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0d1442,#1a237e,#283593);display:flex;align-items:center;justify-content:center;z-index:9999}
#login-screen.hidden{display:none}
.login-card{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-card .login-logo{font-size:40px;font-weight:800;color:#1a237e;letter-spacing:-2px;margin-bottom:4px}
.login-card .login-sub{font-size:13px;color:#888;margin-bottom:28px}
.login-card h2{font-size:18px;color:#333;margin-bottom:20px;font-weight:600}
.login-card input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;margin-bottom:16px;transition:border-color .2s}
.login-card input:focus{outline:none;border-color:#1a237e}
.login-card .login-btn{width:100%;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.login-card .login-btn:hover{background:#283593}
.login-card .login-error{color:#c62828;font-size:12px;margin-top:8px;display:none}
#app-content{display:none}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:22px;font-weight:600}
.header .subtitle{font-size:13px;opacity:.8;margin-top:2px}
.header .logo{font-size:28px;font-weight:700;letter-spacing:-1px}
.header .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px}
.header .logout-btn:hover{background:rgba(255,255,255,.25)}
.filters{background:#fff;padding:16px 32px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #e0e0e0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input{padding:8px 12px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;min-width:160px;background:#fff}
.filter-group select:focus,.filter-group input:focus{outline:none;border-color:#1a237e;box-shadow:0 0 0 2px rgba(26,35,126,.15)}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:#1a237e;color:#fff}.btn-primary:hover{background:#283593}
.btn-outline{background:#fff;color:#666;border:1px solid #d0d0d0}.btn-outline:hover{background:#f5f5f5}
.btn-quarter{padding:6px 14px;border-radius:20px;font-size:12px;background:#e8eaf6;color:#1a237e;border:1px solid #c5cae9}
.btn-quarter.active{background:#1a237e;color:#fff}
.quarter-group{display:flex;gap:6px;align-items:center}
.content{padding:24px 32px;max-width:1600px;margin:0 auto}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;overflow:hidden}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.kpi-card .kpi-icon{position:absolute;top:12px;right:16px;font-size:28px;opacity:.15}
.kpi-card .kpi-label{font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px}
.kpi-card .kpi-value{font-size:32px;font-weight:700;margin:8px 0 4px;color:#1a237e}
.kpi-card .kpi-sub{font-size:11px;color:#999}
.kpi-card.danger .kpi-value{color:#c62828}
.kpi-card.success .kpi-value{color:#2e7d32}
.kpi-card.warning .kpi-value{color:#ef6c00}
.kpi-card.info .kpi-value{color:#1565c0}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.chart-card h3{font-size:14px;font-weight:600;color:#333;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-item{display:flex;align-items:center;gap:8px}
.bar-label{min-width:140px;font-size:12px;color:#555;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:24px;background:#f0f0f0;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding:0 8px}
.bar-fill span{font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.bar-count{min-width:36px;font-size:12px;font-weight:600;color:#333;text-align:right;cursor:pointer}
.bar-count:hover{color:#1a237e;text-decoration:underline}
.table-section{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0}
.table-header h3{font-size:14px;font-weight:600;color:#333}
.table-header .count{font-size:12px;color:#999;background:#f0f0f0;padding:4px 10px;border-radius:12px}
table{width:100%;border-collapse:collapse}
th{background:#f8f9fa;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e0e0e0;cursor:pointer;white-space:nowrap}
th:hover{background:#e8eaf6}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f5f5f5}
tr:hover{background:#f8f9ff}
.status-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.status-em-andamento{background:#e3f2fd;color:#1565c0}
.status-concluido{background:#e8f5e9;color:#2e7d32}
.status-cancelado{background:#fce4ec;color:#c62828}
.status-novo{background:#fff3e0;color:#ef6c00}
.status-pendente{background:#f3e5f5;color:#7b1fa2}
.status-pausa{background:#fff8e1;color:#f57f17}
.atraso-sim{color:#c62828;font-weight:700}
.atraso-nao{color:#2e7d32}
.link-projeto{color:#1a237e;text-decoration:none;font-weight:500}
.link-projeto:hover{text-decoration:underline;color:#283593}
.pagination{display:flex;gap:6px;align-items:center;justify-content:center;padding:16px}
.pagination button{padding:6px 12px;border:1px solid #d0d0d0;background:#fff;border-radius:6px;cursor:pointer;font-size:12px}
.pagination button.active{background:#1a237e;color:#fff;border-color:#1a237e}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;max-width:900px;width:90%;max-height:80vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:16px;color:#1a237e}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999;padding:4px 8px}
.modal-close:hover{color:#333}
.modal-body{padding:20px}
.modal-body table td{font-size:12px;padding:8px 12px}
.empty-state{text-align:center;padding:40px;color:#999;font-size:14px}
@media(max-width:768px){.charts-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.filters{padding:12px 16px}.content{padding:16px}}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GS</div>
    <div class="login-sub">Group Software - BI Projetos</div>
    <h2>Acesso ao Dashboard</h2>
    <form onsubmit="return doLogin()">
      <input type="password" id="loginPassword" placeholder="Digite a senha de acesso" autofocus>
      <button type="submit" class="login-btn">Entrar</button>
    </form>
    <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- CONTEUDO DO APP -->
<div id="app-content">

<div class="header">
  <div>
    <h1>BI Projetos de Migracao</h1>
    <div class="subtitle">Group Software - Zoho Projects</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">GS</div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Periodo / Trimestre</label>
    <div class="quarter-group">
      <button class="btn btn-quarter" onclick="setQuarter('all')">Todos</button>
      <button class="btn btn-quarter" onclick="setQuarter('Q1')">Q1</button>
      <button class="btn btn-quarter" onclick="setQuarter('Q2')">Q2</button>
      <button class="btn btn-quarter" onclick="setQuarter('Q3')">Q3</button>
      <button class="btn btn-quarter" onclick="setQuarter('Q4')">Q4</button>
    </div>
  </div>
  <div class="filter-group">
    <label>Ano</label>
    <select id="filterYear" onchange="applyFilters()"><option value="all">Todos</option></select>
  </div>
  <div class="filter-group">
    <label>Data Inicio</label>
    <input type="date" id="filterDateFrom" onchange="applyFilters()">
  </div>
  <div class="filter-group">
    <label>Data Fim</label>
    <input type="date" id="filterDateTo" onchange="applyFilters()">
  </div>
  <div class="filter-group">
    <label>Grupo</label>
    <select id="filterGroup" onchange="applyFilters()">
      <option value="all">Todos os Grupos</option>
      <option value="Implantacoes Group Condominios">Condominios</option>
      <option value="Implantacoes Novos Modulos">Novos Modulos</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Status</label>
    <select id="filterStatus" onchange="applyFilters()"><option value="all">Todos</option></select>
  </div>
  <div class="filter-group">
    <label>Proprietario</label>
    <select id="filterOwner" onchange="applyFilters()"><option value="all">Todos</option></select>
  </div>
  <div class="filter-group" style="align-self:flex-end">
    <button class="btn btn-outline" onclick="clearFilters()">Limpar Filtros</button>
  </div>
</div>

<div class="content">
  <div class="kpi-row" id="kpiRow"></div>
  <div class="charts-row">
    <div class="chart-card"><h3>Por Status</h3><div class="bar-chart" id="chartStatus"></div></div>
    <div class="chart-card"><h3>Por Proprietario</h3><div class="bar-chart" id="chartOwner"></div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>Por Grupo</h3><div class="bar-chart" id="chartGroup"></div></div>
    <div class="chart-card"><h3>Por Tipo de Projeto</h3><div class="bar-chart" id="chartTipo"></div></div>
  </div>
  <div class="table-section">
    <div class="table-header">
      <h3>Projetos</h3>
      <span class="count" id="tableCount">0 projetos</span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th onclick="sortTable('name')">Projeto</th>
          <th onclick="sortTable('owner')">Proprietario</th>
          <th onclick="sortTable('status_name')">Status</th>
          <th onclick="sortTable('start_date')">Inicio</th>
          <th onclick="sortTable('end_date')">Termino</th>
          <th onclick="sortTable('atraso')">Atraso</th>
          <th onclick="sortTable('percent_complete')">%</th>
          <th onclick="sortTable('group_name')">Grupo</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

</div><!-- end app-content -->

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Detalhes</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// Senha de acesso (codificada em base64)
const PWD_B64 = "Z3JvdXBiaTIwMjY=";
function checkPwd(s){ try { return btoa(s) === PWD_B64; } catch(e) { return false; } }

function doLogin(){
  const pwd=document.getElementById('loginPassword').value;
  if(checkPwd(pwd)){
    sessionStorage.setItem('bi_auth','1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-content').style.display='block';
    initApp();
    return false;
  }
  document.getElementById('loginError').style.display='block';
  document.getElementById('loginPassword').value='';
  return false;
}

function doLogout(){
  sessionStorage.removeItem('bi_auth');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-content').style.display='none';
}

// Auto-login se ja autenticado na sessao
if(sessionStorage.getItem('bi_auth')==='1'){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-content').style.display='block';
  window.addEventListener('DOMContentLoaded',()=>initApp());
}

const PORTAL_URL = "https://projects.zoho.com/portal/groupsoftwaresolucoes";
const TODAY = new Date();
let filteredData = [...PROJECTS_DATA];
let currentSort = {field:'name',asc:true};
let currentPage = 1;
const PAGE_SIZE = 25;
let activeQuarter = 'all';

function getQuarter(ds){if(!ds||ds==='Nao informado')return null;const m=new Date(ds).getMonth();if(m<3)return'Q1';if(m<6)return'Q2';if(m<9)return'Q3';return'Q4';}
function getYear(ds){if(!ds||ds==='Nao informado')return null;return new Date(ds).getFullYear();}
function isOverdue(p){if(!p.end_date||p.end_date==='Nao informado'||p.is_completed)return false;if(p.status_name==='Conclu\u00eddo'||p.status_name==='Cancelado')return false;return new Date(p.end_date)<TODAY;}
function formatDate(d){if(!d||d==='Nao informado')return'-';try{return new Date(d).toLocaleDateString('pt-BR');}catch(e){return d;}}
function getStatusClass(s){if(!s)return'';const l=s.toLowerCase();if(l.includes('andamento'))return'status-em-andamento';if(l.includes('conclu'))return'status-concluido';if(l.includes('cancel'))return'status-cancelado';if(l.includes('novo'))return'status-novo';if(l.includes('pend')||l.includes('migra'))return'status-pendente';if(l.includes('pausa'))return'status-pausa';return'';}
function projectUrl(id){return PORTAL_URL+'#kanbanview/'+id;}

function initFilters(){
  const years=new Set(),statuses=new Set(),owners=new Set();
  PROJECTS_DATA.forEach(p=>{const y=getYear(p.start_date);if(y)years.add(y);if(p.status_name)statuses.add(p.status_name);if(p.owner)owners.add(p.owner);});
  const ys=document.getElementById('filterYear');[...years].sort((a,b)=>b-a).forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;ys.appendChild(o);});
  const ss=document.getElementById('filterStatus');[...statuses].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o);});
  const os=document.getElementById('filterOwner');[...owners].sort().forEach(ow=>{const o=document.createElement('option');o.value=ow;o.textContent=ow;os.appendChild(o);});
}

function setQuarter(q){activeQuarter=q;document.querySelectorAll('.btn-quarter').forEach(b=>b.classList.toggle('active',b.textContent===(q==='all'?'Todos':q)));applyFilters();}
function clearFilters(){document.getElementById('filterYear').value='all';document.getElementById('filterDateFrom').value='';document.getElementById('filterDateTo').value='';document.getElementById('filterGroup').value='all';document.getElementById('filterStatus').value='all';document.getElementById('filterOwner').value='all';activeQuarter='all';document.querySelectorAll('.btn-quarter').forEach(b=>b.classList.toggle('active',b.textContent==='Todos'));applyFilters();}

function applyFilters(){
  const year=document.getElementById('filterYear').value,df=document.getElementById('filterDateFrom').value,dt=document.getElementById('filterDateTo').value,group=document.getElementById('filterGroup').value,status=document.getElementById('filterStatus').value,owner=document.getElementById('filterOwner').value;
  filteredData=PROJECTS_DATA.filter(p=>{
    if(year!=='all'){const y=getYear(p.start_date);if(!y||y!==parseInt(year))return false;}
    if(activeQuarter!=='all'){const q=getQuarter(p.start_date);if(q!==activeQuarter)return false;}
    if(df&&p.start_date&&p.start_date!=='Nao informado'){if(p.start_date<df)return false;}
    if(dt&&p.start_date&&p.start_date!=='Nao informado'){if(p.start_date>dt)return false;}
    if(group!=='all'&&p.group_name!==group)return false;
    if(status!=='all'&&p.status_name!==status)return false;
    if(owner!=='all'&&p.owner!==owner)return false;
    return true;
  });
  currentPage=1;render();
}

function countBy(arr,field){const c={};arr.forEach(i=>{const v=i[field]||'Nao informado';c[v]=(c[v]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1]);}

function renderKPIs(){
  const total=filteredData.length,overdue=filteredData.filter(isOverdue).length,concluded=filteredData.filter(p=>p.status_name==='Conclu\u00eddo').length,inProgress=filteredData.filter(p=>p.status_name==='Em andamento').length,cancelled=filteredData.filter(p=>p.status_name==='Cancelado').length,totalOpen=filteredData.reduce((s,p)=>s+(p.tasks_open||0),0);
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card info" onclick="showModal('Todos os Projetos',filteredData)"><div class="kpi-icon">&#128202;</div><div class="kpi-label">Total Projetos</div><div class="kpi-value">${total}</div><div class="kpi-sub">Clique para ver lista</div></div>
    <div class="kpi-card success" onclick="showModal('Projetos Concluidos',filteredData.filter(p=>p.status_name==='Conclu\u00eddo'))"><div class="kpi-icon">&#9989;</div><div class="kpi-label">Concluidos</div><div class="kpi-value">${concluded}</div><div class="kpi-sub">${total?((concluded/total)*100).toFixed(1):'0'}% do total</div></div>
    <div class="kpi-card" onclick="showModal('Em Andamento',filteredData.filter(p=>p.status_name==='Em andamento'))"><div class="kpi-icon">&#128260;</div><div class="kpi-label">Em Andamento</div><div class="kpi-value">${inProgress}</div><div class="kpi-sub">${total?((inProgress/total)*100).toFixed(1):'0'}% do total</div></div>
    <div class="kpi-card danger" onclick="showModal('Em Atraso',filteredData.filter(isOverdue))"><div class="kpi-icon">&#9888;&#65039;</div><div class="kpi-label">Em Atraso</div><div class="kpi-value">${overdue}</div><div class="kpi-sub">${total?((overdue/total)*100).toFixed(1):'0'}% do total</div></div>
    <div class="kpi-card warning" onclick="showModal('Cancelados',filteredData.filter(p=>p.status_name==='Cancelado'))"><div class="kpi-icon">&#128683;</div><div class="kpi-label">Cancelados</div><div class="kpi-value">${cancelled}</div><div class="kpi-sub">Clique para ver lista</div></div>
    <div class="kpi-card" onclick="showModal('Tarefas Abertas',filteredData.filter(p=>p.tasks_open>0))"><div class="kpi-icon">&#128203;</div><div class="kpi-label">Tarefas Abertas</div><div class="kpi-value">${totalOpen}</div><div class="kpi-sub">Clique para ver projetos</div></div>`;
}

const COLORS=['#1a237e','#283593','#3949ab','#5c6bc0','#7986cb','#9fa8da','#c5cae9','#42a5f5','#1e88e5','#1565c0'];

function renderBarChart(cid,data){
  const max=data.length?data[0][1]:1;
  document.getElementById(cid).innerHTML=data.slice(0,8).map(([label,count],i)=>{
    const pct=(count/max)*100,color=COLORS[i%COLORS.length];
    return`<div class="bar-item"><div class="bar-label" title="${label}">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"><span>${count}</span></div></div><div class="bar-count" onclick="filterAndShow('${cid}','${label.replace(/'/g,"\\'")}')}">${count}</div></div>`;
  }).join('');
}

function filterAndShow(chart,value){
  let field='status_name';
  if(chart==='chartOwner')field='owner';else if(chart==='chartGroup')field='group_name';else if(chart==='chartTipo')field='tipo_de_projeto';
  const items=filteredData.filter(p=>(p[field]||'Nao informado')===value);
  showModal(value+' ('+items.length+')',items);
}

function showModal(title,items){
  document.getElementById('modalTitle').textContent=title;
  if(!items.length){document.getElementById('modalBody').innerHTML='<div class="empty-state">Nenhum projeto encontrado</div>';}
  else{
    let h='<table><thead><tr><th>Projeto</th><th>Proprietario</th><th>Status</th><th>Inicio</th><th>Termino</th><th>Atraso</th></tr></thead><tbody>';
    items.forEach(p=>{const od=isOverdue(p);h+=`<tr><td><a href="${projectUrl(p.id)}" target="_blank" class="link-projeto">${p.name}</a></td><td>${p.owner}</td><td><span class="status-badge ${getStatusClass(p.status_name)}">${p.status_name}</span></td><td>${formatDate(p.start_date)}</td><td>${formatDate(p.end_date)}</td><td class="${od?'atraso-sim':'atraso-nao'}">${od?'Sim':'Nao'}</td></tr>`;});
    h+='</tbody></table>';document.getElementById('modalBody').innerHTML=h;
  }
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

function sortTable(field){if(currentSort.field===field)currentSort.asc=!currentSort.asc;else{currentSort.field=field;currentSort.asc=true;}render();}

function renderTable(){
  const sorted=[...filteredData].sort((a,b)=>{let va=a[currentSort.field]||'',vb=b[currentSort.field]||'';if(currentSort.field==='atraso'){va=isOverdue(a)?1:0;vb=isOverdue(b)?1:0;}if(currentSort.field==='percent_complete'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}if(va<vb)return currentSort.asc?-1:1;if(va>vb)return currentSort.asc?1:-1;return 0;});
  const start=(currentPage-1)*PAGE_SIZE,page=sorted.slice(start,start+PAGE_SIZE),totalPages=Math.ceil(sorted.length/PAGE_SIZE);
  document.getElementById('tableCount').textContent=sorted.length+' projetos';
  document.getElementById('tableBody').innerHTML=page.map(p=>{const od=isOverdue(p);return`<tr><td><a href="${projectUrl(p.id)}" target="_blank" class="link-projeto">${p.name}</a></td><td>${p.owner}</td><td><span class="status-badge ${getStatusClass(p.status_name)}">${p.status_name}</span></td><td>${formatDate(p.start_date)}</td><td>${formatDate(p.end_date)}</td><td class="${od?'atraso-sim':'atraso-nao'}">${od?'Sim':'Nao'}</td><td>${p.percent_complete||0}%</td><td style="font-size:11px">${(p.group_name||'').replace('Implantacoes ','')}</td></tr>`;}).join('');
  const pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let ph=`<button ${currentPage===1?'disabled':''} onclick="currentPage=1;renderTable()">&#171;</button><button ${currentPage===1?'disabled':''} onclick="currentPage--;renderTable()">&#8249;</button>`;
  for(let i=Math.max(1,currentPage-2);i<=Math.min(totalPages,currentPage+2);i++){ph+=`<button class="${i===currentPage?'active':''}" onclick="currentPage=${i};renderTable()">${i}</button>`;}
  ph+=`<button ${currentPage===totalPages?'disabled':''} onclick="currentPage++;renderTable()">&#8250;</button><button ${currentPage===totalPages?'disabled':''} onclick="currentPage=${totalPages};renderTable()">&#187;</button>`;
  pg.innerHTML=ph;
}

function render(){renderKPIs();renderBarChart('chartStatus',countBy(filteredData,'status_name'));renderBarChart('chartOwner',countBy(filteredData,'owner'));renderBarChart('chartGroup',countBy(filteredData,'group_name'));renderBarChart('chartTipo',countBy(filteredData,'tipo_de_projeto'));renderTable();}

function initApp(){initFilters();setQuarter('all');document.querySelector('.btn-quarter').classList.add('active');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
if(sessionStorage.getItem('bi_auth')==='1')initApp();
</script>
</body>
